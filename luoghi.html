        { image:'assets/grotte-pertosa.jpg', infoUrl:'https://comune.auletta.sa.it/vivere-il-comune/luoghi/le-grotte-di-pertosa-auletta/', mapsQuery:'Grotte di Pertosa-Auletta', title:{it:'Grotte di Pertosa-Auletta',en:'Pertosa-Auletta Caves',es:'Cuevas de Pertosa-Auletta',fr:'Grottes de Pertosa-Auletta'}, desc:{it:'Grotte spettacolari nel Cilento, con un tratto navigabile su fiume sotterraneo. Consigliate scarpe comode e una giacca.',en:'Spectacular caves in Cilento, with a navigable underground river section.',es:'Cuevas espectaculares en el Cilento, con un tramo navegable.',fr:'Grottes spectaculaires dans le Cilento, avec une partie navigable.'}}
      ]
    },
    {
      id:'eventi',
      title:{it:'Eventi e cose speciali',en:'Events and special things',es:'Eventos y cosas especiales',fr:'Événements et choses spéciales'},
      note:{it:'Idee particolari da controllare in base al periodo del soggiorno.',en:'Special ideas to check depending on your stay dates.',es:'Ideas especiales para comprobar según las fechas de estancia.',fr:'Idées spéciales à vérifier selon les dates du séjour.'},
      places:[
        { image:'assets/chiena-campagna.jpg', fallback:'assets/piazza-della-liberta.jpg', badge:'event', cardClass:'event-card', infoUrl:'https://www.google.com/search?q=A+Chiena+Campagna+Salerno', mapsQuery:'Campagna, Salerno', title:{it:'’A Chiena di Campagna',en:'’A Chiena in Campagna',es:'’A Chiena de Campagna',fr:'’A Chiena de Campagna'}, desc:{it:'Uno degli eventi estivi più particolari della zona: l’acqua scorre per le strade del centro storico creando un’atmosfera fresca, unica e molto caratteristica.',en:'One of the most unusual summer events nearby: water flows through the streets of the old town, creating a fresh and unique atmosphere.',es:'Uno de los eventos de verano más particulares de la zona: el agua recorre las calles del casco antiguo.',fr:'L’un des événements d’été les plus particuliers : l’eau coule dans les rues du centre historique.'}},
        { image:'assets/giffoni-film-festival.jpg', fallback:'assets/teatro-verdi.jpg', badge:'event', cardClass:'event-card', infoUrl:'https://www.giffonifilmfestival.it/', mapsQuery:'Giffoni Valle Piana', title:{it:'Giffoni Film Festival',en:'Giffoni Film Festival',es:'Giffoni Film Festival',fr:'Giffoni Film Festival'}, desc:{it:'Festival internazionale dedicato al cinema per ragazzi e famiglie. Nel 2026 è indicato dal 17 al 25 luglio: controllate sempre il sito ufficiale per programma, ospiti e aggiornamenti.',en:'International film festival for children, teenagers and families. In 2026 it is listed from 17 to 25 July: always check the official site for programme and updates.',es:'Festival internacional de cine para niños, jóvenes y familias. En 2026 está indicado del 17 al 25 de julio.',fr:'Festival international de cinéma pour enfants, jeunes et familles. En 2026, il est indiqué du 17 au 25 juillet.'}}
      ]
    }
  ];

  var labels = {
    info:{ it:'Info / Biglietti', en:'Info / Tickets', es:'Info / Entradas', fr:'Infos / Billets' },
    maps:{ it:'📍 Apri su Maps', en:'📍 Open in Maps', es:'📍 Abrir en Maps', fr:'📍 Ouvrir sur Maps' },
    badges:{
      free:{it:'Spiaggia libera', en:'Free beach', es:'Playa libre', fr:'Plage libre'},
      paid:{it:'Lido / a pagamento', en:'Beach club', es:'Lido / de pago', fr:'Plage aménagée'},
      event:{it:'Evento', en:'Event', es:'Evento', fr:'Événement'},
      nature:{it:'Natura', en:'Nature', es:'Naturaleza', fr:'Nature'}
    }
  };

  function getLang(){
    var params = new URLSearchParams(window.location.search);
    var lang = params.get('lang');
    if (['it','en','es','fr'].indexOf(lang) !== -1) return lang;
    try { lang = localStorage.getItem('guestGuideLang'); } catch(e) {}
    if (['it','en','es','fr'].indexOf(lang) !== -1) return lang;
    return 'it';
  }

  function safeText(obj, lang){ return (obj && (obj[lang] || obj.it)) || ''; }

  function imageTag(place, lang){
    var fallback = place.fallback || 'assets/placeholder.svg';
    return '<img src="' + place.image + '" alt="' + safeText(place.title, lang).replace(/"/g,'&quot;') + '" onerror="this.onerror=null;this.src=\'' + fallback + '\';">';
  }

  function renderPlace(place, lang){
    var mapsUrl = place.mapsUrl || ('https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(place.mapsQuery));
    var badge = place.badge ? '<span class="badge ' + place.badge + '">' + labels.badges[place.badge][lang] + '</span>' : '';
    var classes = ['place-card'];
    if (place.beachType === 'free') classes.push('beach-free');
    if (place.beachType === 'paid') classes.push('beach-paid');
    if (place.cardClass) classes.push(place.cardClass);
    return '<article class="' + classes.join(' ') + '">' +
      badge + imageTag(place, lang) +
      '<div class="place-content">' +
      '<h3>' + safeText(place.title, lang) + '</h3>' +
      '<p>' + safeText(place.desc, lang) + '</p>' +
      '<div class="place-actions">' +
      '<a class="place-btn" href="' + place.infoUrl + '" target="_blank" rel="noopener">' + labels.info[lang] + '</a>' +
      '<a class="place-btn light" href="' + mapsUrl + '" target="_blank" rel="noopener">' + labels.maps[lang] + '</a>' +
      '</div></div></article>';
  }

  function renderCategories(lang){
    var container = document.getElementById('categories-container');
    if (!container) return;
    container.innerHTML = categories.map(function(cat){
      return '<div class="category-section" id="' + cat.id + '">' +
        '<div class="category-head"><div><h2>' + safeText(cat.title, lang) + '</h2><p class="category-note">' + safeText(cat.note, lang) + '</p></div></div>' +
        '<div class="places-grid">' + cat.places.map(function(place){ return renderPlace(place, lang); }).join('') + '</div>' +
        '</div>';
    }).join('');
  }

  function translatePage(lang){
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-it], [data-it-html]').forEach(function(el){
      var htmlTranslation = el.getAttribute('data-' + lang + '-html');
      var textTranslation = el.getAttribute('data-' + lang);
      if (htmlTranslation) el.innerHTML = htmlTranslation;
      else if (textTranslation) el.textContent = textTranslation;
    });
    var home = document.querySelector('.back-home');
    if (home) home.href = 'index.html#' + lang;
    renderCategories(lang);
    try { localStorage.setItem('guestGuideLang', lang); } catch(e) {}
  }

  translatePage(getLang());
</script>
</body>
</html>
