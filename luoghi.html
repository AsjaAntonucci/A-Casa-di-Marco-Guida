<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --ottanio:#0f7f83; --ottanio-dark:#075f63; --ottanio-soft:#dff3f2; --white:#fff; --milk:#fbfbf8; --text:#263238; --muted:#6f7d80; --shadow:0 18px 50px rgba(0,70,75,.20); --radius:28px; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--milk); color:var(--text); font-family:'Poppins',sans-serif; line-height:1.65; }
    h1,h2,h3 { font-family:'Pacifico',cursive; font-weight:400; color:var(--ottanio-dark); }
    .page-hero { min-height:38vh; background:linear-gradient(180deg, rgba(0,80,85,.25), rgba(0,80,85,.55)), url("assets/garden-main.jpg") center/cover no-repeat; color:#fff; display:flex; align-items:flex-end; padding:38px 20px; }
    .page-hero div { max-width:1000px; margin:0 auto; width:100%; }
    .page-hero h1 { color:#fff; font-size:clamp(38px, 7vw, 68px); text-shadow:0 5px 20px rgba(0,0,0,.35); }
    main { max-width:1000px; margin:0 auto; padding:28px 16px 60px; }
    section { background:#fff; border-radius:28px; padding:28px; box-shadow:var(--shadow); margin-bottom:22px; }
    .back-home { display:inline-flex; margin-bottom:18px; background:var(--ottanio); color:#fff; text-decoration:none; border-radius:999px; padding:11px 18px; font-weight:600; }
    .places-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      margin-top: 20px;
    }

    .place-card {
      background: var(--ottanio-soft);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(0, 80, 85, .12);
    }

    .place-card img {
      width: 100%;
      height: 190px;
      object-fit: cover;
      display: block;
    }

    .place-content {
      padding: 18px;
    }

    .place-content h3 {
      font-family: 'Pacifico', cursive;
      font-size: 25px;
      color: var(--ottanio-dark);
      margin-bottom: 8px;
    }

    .place-content p {
      font-size: 15px;
      color: var(--text);
    }

    .place-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .place-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--ottanio);
      color: #fff;
      border-radius: 999px;
      padding: 10px 15px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
    }

    .place-btn.light {
      background: #fff;
      color: var(--ottanio-dark);
      border: 1px solid rgba(15, 127, 131, .25);
    }

    @media (max-width: 720px) {
      .places-grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .place-card img {
        height: 175px;
      }

      .place-content {
        padding: 15px;
      }

      .place-content h3 {
        font-size: 23px;
      }

      .place-content p {
        font-size: 14px;
      }

      .place-actions {
        flex-direction: column;
      }

      .place-btn {
        width: 100%;
        font-size: 13px;
        padding: 10px 14px;
      }
    }
  </style>
</head>
<body>
  <header class="page-hero"><div><h1 data-it="Luoghi da visitare" data-en="Places to visit" data-es="Lugares para visitar" data-fr="Lieux à visiter">Luoghi da visitare</h1></div></header>

      <div id="places-grid" class="places-grid"></div>
    </section>

      title: {

      desc: {

  var labels = {

      it: "Info / Biglietti",
      en: "Info / Tickets",
      es: "Info / Entradas",
      fr: "Infos / Billets"
    },
    maps: {
      it: "📍 Apri su Maps",
      en: "📍 Open in Maps",
      es: "📍 Abrir en Maps",
      fr: "📍 Ouvrir sur Maps"
    }
  };

  function getLang() {
    var params = new URLSearchParams(window.location.search);
    var lang = params.get('lang');

    if (lang === 'it' || lang === 'en' || lang === 'es' || lang === 'fr') {
      return lang;
    }

    try {
      lang = localStorage.getItem('guestGuideLang');
    } catch (e) {}

    if (lang === 'it' || lang === 'en' || lang === 'es' || lang === 'fr') {
      return lang;
    }

    return 'it';
  }

  function renderPlaces(lang) {
    var container = document.getElementById('places-grid');
    if (!container) return;

    container.innerHTML = places.map(function (place) {
      var mapsUrl = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(place.mapsQuery);

      return `
        <article class="place-card">
          <img src="${place.image}" alt="${place.title[lang]}">
          <div class="place-content">
            <h3>${place.title[lang]}</h3>
            <p>${place.desc[lang]}</p>
            <div class="place-actions">
              <a class="place-btn" href="${place.infoUrl}" target="_blank">${labels.info[lang]}</a>
              <a class="place-btn light" href="${mapsUrl}" target="_blank">${labels.maps[lang]}</a>
            </div>
          </div>
        </article>
      `;
    }).join('');
  }

  function translatePage(lang) {
    document.documentElement.lang = lang;

    document.querySelectorAll('[data-it], [data-it-html]').forEach(function (el) {
      var htmlTranslation = el.getAttribute('data-' + lang + '-html');
      var textTranslation = el.getAttribute('data-' + lang);

      if (htmlTranslation) {
        el.innerHTML = htmlTranslation;
      } else if (textTranslation) {
        el.textContent = textTranslation;
      }
    });

    var home = document.querySelector('.back-home');
    if (home) {
      home.href = 'index.html#' + lang;
    }

    renderPlaces(lang);

    try {
      localStorage.setItem('guestGuideLang', lang);
    } catch (e) {}
  }

  translatePage(getLang());

</body>
</html>
