      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .food-choice {
      border: none;
      background: var(--ottanio-soft);
      border-radius: 22px;
      padding: 18px;
      text-align: left;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(0, 80, 85, .10);
    }

    .food-choice span {
      display: block;
      font-size: 28px;
      margin-bottom: 8px;
    }

    .food-choice strong {
      display: block;
      color: var(--ottanio-dark);
      font-size: 16px;
      margin-bottom: 4px;
    }

    .food-choice small {
      color: var(--muted);
      font-size: 13px;
    }

    .food-category {
      display: none;
    }

    .food-category.active {
      display: block;
    }

    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .back-category {
      border: none;
      background: var(--ottanio);
      color: #fff;
      border-radius: 999px;
      padding: 10px 15px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      cursor: pointer;
    }

    .restaurant-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }

    .restaurant-card {
      background: var(--ottanio-soft);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(0, 80, 85, .12);
    }

    .restaurant-card img {
      width: 100%;
      height: 190px;
      object-fit: cover;
      display: block;
    }

    .restaurant-content {
      padding: 18px;
    }

    .restaurant-content h3 {
      font-size: 25px;
      margin-bottom: 8px;
    }

    .restaurant-content p {
      font-size: 15px;
      margin-bottom: 10px;
    }

    .tip-box {
      background: #fff;
      border-left: 5px solid var(--ottanio);
      border-radius: 16px;
      padding: 12px;
      font-size: 14px;
      margin-top: 10px;
    }

    .restaurant-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .restaurant-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--ottanio);
      color: #fff;
      border-radius: 999px;
      padding: 10px 15px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
    }

    .restaurant-btn.light {
      background: #fff;
      color: var(--ottanio-dark);
      border: 1px solid rgba(15, 127, 131, .25);
    }

      body {
        font-size: 14px;
        line-height: 1.55;
      }

      .category-header {

      .restaurant-grid {

      .restaurant-actions {
        flex-direction: column;
      }

      .restaurant-btn,
      .back-category {
        width: 100%;
        text-align: center;
      }
    }

</head>

  function getLang() {
    var params = new URLSearchParams(window.location.search);
    var lang = params.get('lang');

    if (lang === 'it' || lang === 'en' || lang === 'es' || lang === 'fr') return lang;

    try {
      lang = localStorage.getItem('guestGuideLang');
    } catch (e) {}

    if (lang === 'it' || lang === 'en' || lang === 'es' || lang === 'fr') return lang;

    return 'it';
  }

  function translatePage(lang) {
    currentLang = lang;
    document.documentElement.lang = lang;

    document.querySelectorAll('[data-it], [data-it-html]').forEach(function (el) {
      var htmlTranslation = el.getAttribute('data-' + lang + '-html');
      var textTranslation = el.getAttribute('data-' + lang);

      if (htmlTranslation) {
        el.innerHTML = htmlTranslation;
      } else if (textTranslation) {
        el.textContent = textTranslation;
      }
    });

    var home = document.querySelector('.back-home');
    if (home) {
      home.href = 'index.html#' + lang;
    }

    try {
      localStorage.setItem('guestGuideLang', lang);
    } catch (e) {}
  }

  function showCategory(categoryKey) {
    var category = categories[categoryKey];
    var grid = document.getElementById('restaurant-grid');
    var title = document.getElementById('category-title');

    if (!category || !grid || !title) return;

    title.textContent = category.title[currentLang];

    grid.innerHTML = category.restaurants.map(function (place) {
      var mapsUrl = place.mapsUrl || "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(place.mapsQuery);

      return `
        <article class="restaurant-card">
          <img src="${place.image}" alt="${place.name[currentLang]}">
          <div class="restaurant-content">
            <h3>${place.name[currentLang]}</h3>
            <p>${place.desc[currentLang]}</p>

            <div class="tip-box">
              <strong>${labels.tip[currentLang]}:</strong>
              ${place.tip[currentLang]}
            </div>

            <div class="restaurant-actions">
              <a class="restaurant-btn light" href="${mapsUrl}" target="_blank">
                ${labels.maps[currentLang]}
              </a>
            </div>
          </div>
        </article>
      `;
    }).join('');

    document.getElementById('food-start').style.display = 'none';
    document.getElementById('food-category').classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function hideCategory() {
    document.getElementById('food-category').classList.remove('active');
    document.getElementById('food-start').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  translatePage(getLang());
