<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dove parcheggiare · A Casa di Marco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --ottanio:#0f7f83; --ottanio-dark:#075f63; --ottanio-soft:#dff3f2; --white:#fff; --milk:#fbfbf8; --text:#263238; --muted:#6f7d80; --shadow:0 18px 50px rgba(0,70,75,.20); --radius:28px; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--milk); color:var(--text); font-family:'Poppins',sans-serif; line-height:1.65; }
    h1,h2,h3 { font-family:'Pacifico',cursive; font-weight:400; color:var(--ottanio-dark); }
    .page-hero { min-height:38vh; background:linear-gradient(180deg, rgba(0,80,85,.25), rgba(0,80,85,.55)), url("assets/garden-main.jpg") center/cover no-repeat; color:#fff; display:flex; align-items:flex-end; padding:38px 20px; }
    .page-hero div { max-width:1000px; margin:0 auto; width:100%; }
    .page-hero h1 { color:#fff; font-size:clamp(38px, 7vw, 68px); text-shadow:0 5px 20px rgba(0,0,0,.35); }
    main { max-width:1000px; margin:0 auto; padding:28px 16px 60px; }
    section { background:#fff; border-radius:28px; padding:28px; box-shadow:var(--shadow); margin-bottom:22px; }
    .back-home { display:inline-flex; margin-bottom:18px; background:var(--ottanio); color:#fff; text-decoration:none; border-radius:999px; padding:11px 18px; font-weight:600; }
    .img-card img { width:100%; border-radius:22px; margin-top:18px; }
  </style>
</head>
<body>
  <header class="page-hero"><div><h1>Dove parcheggiare</h1></div></header>
  <main>
    <a class="back-home" href="index.html">← Torna alla home</a>
    <section>
      <h2>Parcheggio</h2>
      <p>È possibile parcheggiare nel giardino della casa oppure fuori sulla strada, prima della curva per entrare.</p>
      <div class="img-card"><img src="assets/gate.jpg" alt="Ingresso A Casa di Marco"></div>
    </section>
  </main>
</body>
</html>
