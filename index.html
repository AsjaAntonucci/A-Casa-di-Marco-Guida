<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Casa di Marco · Guest Guide</title>
  <meta name="description" content="Guest guide digitale di A Casa di Marco, Garden Cottage Escape a Salerno." />
  <style>
    :root{
      /* palette ispirata a beb.it: fondo chiaro, accenti blu e dorato */
      --bg:#f5f5f5;
      --panel:#ffffff;
      --accent:#005b8c;
      --accent-soft:#e0f1f8;
      --gold:#c89b3c;
      --text:#202124;
      --muted:#6f7175;
      --shadow:0 18px 55px rgba(0,0,0,.16);
      --radius:24px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif,"Apple Color Emoji","Segoe UI Emoji";line-height:1.6}
    h1,h2,h3{font-weight:600}
    a{color:inherit;text-decoration:none}

    /* SCHERMATA LINGUA */
    .language-screen{
      min-height:100vh;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      overflow:hidden;
      color:#fff;
    }
    .language-screen::before{
      content:"";
      position:absolute;
      inset:0;
      background:url("assets/garden-main.jpg") center/cover no-repeat;
      filter:blur(6px) brightness(.7);
      transform:scale(1.05);
      z-index:-2;
    }
    .language-screen::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg,rgba(0,0,0,.55),rgba(0,0,0,.25));
      z-index:-1;
    }
    .language-box{
      width:min(520px,100%);
      background:rgba(0,0,0,.35);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:32px 26px 28px;
      backdrop-filter:blur(10px);
      text-align:center;
    }
    .welcome-tag{
      display:inline-block;
      padding:6px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.16);
      font-size:13px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .brand{font-size:30px;margin:16px 0 4px}
    .multi-welcome{
      font-size:15px;
      margin-bottom:22px;
      color:#f1f3f4;
    }
    .multi-welcome span{display:block}
    .lang-buttons{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:10px;
    }
    .lang-btn{
      border:none;
      border-radius:999px;
      padding:10px 16px;
      background:#fff;
      color:var(--accent);
      font-weight:600;
      font-size:14px;
      display:inline-flex;
      align-items:center;
      gap:6px;
      cursor:pointer;
      box-shadow:0 8px 20px rgba(0,0,0,.25);
      transition:.18s;
    }
    .lang-btn:hover{transform:translateY(-1px);box-shadow:0 10px 26px rgba(0,0,0,.32)}
    .lang-btn span.flag{font-size:16px}

    /* RESTO DEL SITO (resta come prima, solo nascosto all'inizio) */
    .site{display:none;background:var(--bg);}
    header.hero{min-height:70vh;background:linear-gradient(90deg,rgba(0,91,140,.85),rgba(0,91,140,.55)),url("assets/garden-main.jpg") center/cover no-repeat;color:#fff;display:flex;align-items:flex-end;padding:42px 18px}
    .hero-inner{max-width:1120px;margin:0 auto;width:100%;padding-bottom:30px}
    .hero h1{font-size:clamp(34px,6vw,64px);line-height:1.02;margin-bottom:10px}
    .hero p{font-size:clamp(17px,2.4vw,24px);max-width:640px}
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
    .btn{border-radius:999px;padding:10px 18px;border:none;cursor:pointer;font-weight:600;font-size:14px;display:inline-flex;align-items:center;justify-content:center;gap:6px;text-decoration:none}
    .btn.primary{background:#fff;color:var(--accent)}
    .btn.secondary{background:var(--accent-soft);color:var(--accent)}

    .topbar{position:sticky;top:0;z-index:20;background:#ffffffcc;backdrop-filter:blur(12px);box-shadow:0 6px 18px rgba(0,0,0,.1);padding:8px 10px;overflow-x:auto;white-space:nowrap}
    .topbar a,.topbar button{background:transparent;border:none;border-radius:999px;padding:7px 12px;margin:3px;font-size:13px;color:var(--accent);cursor:pointer}
    .topbar a:hover,.topbar button:hover{background:var(--accent-soft)}

    main{max-width:1120px;margin:0 auto;padding:26px 16px 60px}
    section{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin:18px 0}
    h2{font-size:clamp(24px,4vw,32px);color:var(--accent);margin-bottom:10px}
    .lead{font-size:16px;color:var(--muted);max-width:840px}

    @media(max-width:720px){
      .language-box{padding:26px 20px}
      .brand{font-size:24px}
    }
  </style>
</head>
<body>
  <!-- SCHERMATA INIZIALE LINGUA -->
  <div id="languageScreen" class="language-screen">
    <div class="language-box">
      <div class="welcome-tag">Guest Guide · A Casa di Marco</div>
      <h1 class="brand">A Casa di Marco</h1>
      <div class="multi-welcome">
        <span>Benvenuti</span>
        <span>Welcome</span>
        <span>Bienvenidos</span>
        <span>Bienvenue</span>
      </div>
      <div class="lang-buttons">
        <button class="lang-btn" onclick="showSite('it')"><span class="flag">🇮🇹</span><span>Italiano</span></button>
        <button class="lang-btn" onclick="showSite('en')"><span class="flag">🇬🇧</span><span>English</span></button>
        <button class="lang-btn" onclick="showSite('es')"><span class="flag">🇪🇸</span><span>Español</span></button>
        <button class="lang-btn" onclick="showSite('fr')"><span class="flag">🇫🇷</span><span>Français</span></button>
      </div>
    </div>
  </div>

  <!-- RESTO DEL SITO: qui sotto puoi mantenere le sezioni che avevamo già definito -->
  <div id="site" class="site">
    <header class="hero">
      <div class="hero-inner">
        <h1>A Casa di Marco · Guest Guide</h1>
        <p data-it="La vostra casa con giardino a Salerno."
           data-en="Your home with a garden in Salerno."
           data-es="Vuestra casa con jardín en Salerno."
           data-fr="Votre maison avec jardin à Salerne.">La vostra casa con giardino a Salerno.</p>
        <div class="actions">
          <a class="btn primary" href="https://wa.me/393923064010" target="_blank">WhatsApp</a>
          <a class="btn secondary" href="https://www.google.com/maps/search/?api=1&query=Via+di+Brignano+Inferiore+69+Salerno" target="_blank">Google Maps</a>
        </div>
      </div>
    </header>

    <nav class="topbar">
      <button onclick="showSite('it')">IT</button>
      <button onclick="showSite('en')">EN</button>
      <button onclick="showSite('es')">ES</button>
      <button onclick="showSite('fr')">FR</button>
      <!-- link alle sezioni esistenti -->
      <a href="#welcome">Welcome</a>
      <a href="#checkin">Check-in</a>
      <a href="#wifi">Wi‑Fi</a>
      <a href="#rules">Rules</a>
      <a href="#transport">Transport</a>
      <a href="#places">Places</a>
      <a href="#food">Food</a>
      <a href="#contacts">Contacts</a>
    </nav>

    <main>
      <!-- Qui rimangono invariati i tuoi <section> già presenti: welcome, checkin, wifi, rules, ... -->
    </main>
  </div>

  <script>
    function showSite(lang){
      document.getElementById('languageScreen').style.display='none';
      document.getElementById('site').style.display='block';
      document.documentElement.lang = lang;
      localStorage.setItem('guestGuideLang', lang);
      document.querySelectorAll('[data-it]').forEach(function(el){
        var value = el.getAttribute('data-' + lang);
        if(value){ el.textContent = value; }
      });
    }

    (function(){
      var saved = localStorage.getItem('guestGuideLang');
      if(saved){ showSite(saved); }
    })();
  </script>
</body>
</html>
